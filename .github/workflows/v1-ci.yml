name: V1 CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: read
  packages: write

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Bootstrap user is `postgres` (default). soctalk_admin is created
        # by a setup step below with NOSUPERUSER NOBYPASSRLS so RLS tests
        # see the role-attribute invariants the platform relies on.
        # Postgres refuses to downgrade the bootstrap user, which is why
        # we don't make soctalk_admin the bootstrap.
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soctalk
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install project + dev tools
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pip-audit import-linter ruff mypy

      - name: import-linter (open-core boundary)
        run: |
          lint-imports --config .importlinter

      - name: ruff
        run: ruff check src tests || true  # non-fatal until baseline clean

      - name: Run unit tests (skip Postgres integration)
        env:
          SKIP_INTEGRATION: '1'
        run: pytest tests/v1 -v

      - name: Bootstrap SocTalk roles
        run: |
          # Pre-create all three SocTalk roles with their correct attributes,
          # mirroring what infra (Helm pre-install Job) does in production.
          # The migration uses ``CREATE ROLE ... IF NOT EXISTS`` so these
          # blocks are no-ops once the roles are present.
          # Why bootstrap them here instead of letting the migration do it:
          # soctalk_admin must be NOSUPERUSER NOBYPASSRLS (RLS invariant),
          # but PG refuses to let a non-BYPASSRLS role CREATE another role
          # with BYPASSRLS — so the migration would deadlock on
          # ``CREATE ROLE soctalk_mssp LOGIN BYPASSRLS``. The privileged
          # bootstrap user (``postgres``) creates the BYPASSRLS role; the
          # migration just sees it already exists.
          PGPASSWORD=postgres psql -h localhost -U postgres -d soctalk \
            -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE soctalk_admin LOGIN CREATEROLE PASSWORD 'soctalk_admin';" \
            -c "CREATE ROLE soctalk_app   LOGIN PASSWORD 'soctalk_app';" \
            -c "CREATE ROLE soctalk_mssp  LOGIN BYPASSRLS PASSWORD 'soctalk_mssp';" \
            -c "GRANT ALL ON DATABASE soctalk TO soctalk_admin;" \
            -c "GRANT ALL ON SCHEMA public TO soctalk_admin;"

      - name: Apply V1 migration
        env:
          DATABASE_URL: postgresql+asyncpg://soctalk_admin:soctalk_admin@localhost:5432/soctalk
        run: |
          # Phase 1 alembic migration lives in alembic/versions/v1_0001_multi_tenancy.py
          # CI uses a temporary alembic.ini override pointed at the test Postgres.
          alembic -x database_url="postgresql://soctalk_admin:soctalk_admin@localhost:5432/soctalk" upgrade head

      - name: Run integration tests (RLS isolation)
        env:
          # In-process alembic reversibility tests (test_migration_v1_00*.py)
          # resolve a bare DATABASE_URL through alembic/env.py; without it
          # they fall back to a non-existent ``soctalk`` superuser and fail
          # auth. Mirror the 'Apply V1 migration' step above.
          DATABASE_URL: postgresql+asyncpg://soctalk_admin:soctalk_admin@localhost:5432/soctalk
          DATABASE_URL_ADMIN: postgresql+asyncpg://soctalk_admin:soctalk_admin@localhost:5432/soctalk
          DATABASE_URL_APP: postgresql+asyncpg://soctalk_app:soctalk_app@localhost:5432/soctalk
          DATABASE_URL_MSSP: postgresql+asyncpg://soctalk_mssp:soctalk_mssp@localhost:5432/soctalk
        run: |
          # Roles + passwords were set in the Bootstrap step above.
          #
          # test_metrics_bridge_tenant_scope.py boots the full ASGI app and
          # drives the login path through the module-global async engines
          # (soctalk.core.tenancy.db). Under pytest-asyncio function-scoped
          # event loops those globals get bound to an earlier test's loop and
          # the app-role session silently misbehaves -> spurious login 401.
          # It's a pre-existing test-isolation issue (the test passes on its
          # own). Run it in a separate process so the engines start pristine.
          pytest tests/v1 -v -m integration \
            --ignore=tests/v1/test_metrics_bridge_tenant_scope.py
          pytest tests/v1/test_metrics_bridge_tenant_scope.py -v -m integration

      - name: pip-audit (advisory)
        run: pip-audit --strict || echo "pip-audit reported issues (advisory for V1)"

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: helm lint soctalk-system
        run: helm lint charts/soctalk-system

      - name: helm dependency build soctalk-tenant
        # soctalk-tenant depends on file:// wazuh + linux-ep siblings; without
        # `dependency build` populating charts/soctalk-tenant/charts/ helm
        # lint + template both fail with "missing in charts/ directory".
        run: helm dependency build charts/soctalk-tenant

      - name: helm lint soctalk-tenant
        run: helm lint charts/soctalk-tenant

      - name: helm template soctalk-system (smoke)
        run: |
          helm template soctalk-system charts/soctalk-system \
            --set install.msspId=00000000-0000-0000-0000-000000000000 \
            --set install.msspName=ci \
            --set install.installId=00000000-0000-0000-0000-000000000001 \
            --set ingress.hostnames.mssp=mssp.example.com \
            --set ingress.hostnames.customer=customer.example.com > /tmp/system.rendered.yaml
          wc -l /tmp/system.rendered.yaml

      - name: helm template soctalk-tenant (smoke)
        run: |
          helm template tenant-acme charts/soctalk-tenant \
            --set tenant.id=00000000-0000-0000-0000-000000000002 \
            --set tenant.slug=acme \
            --set tenant.msspId=00000000-0000-0000-0000-000000000000 \
            --set tenant.installId=00000000-0000-0000-0000-000000000001 \
            --set tenant.displayName=Acme \
            --set llm.apiKeyRef.name=tenant-00000000-0000-0000-0000-000000000002-llm \
            --set agentIngress.hostname=acme.soc.mssp.local \
            --set networkPolicies.allowedLlmHosts[0]=api.openai.com > /tmp/tenant.rendered.yaml
          wc -l /tmp/tenant.rendered.yaml

  frontend:
    # The split frontend apps (frontend/{mssp,customer}) were retired
    # in favor of the role-aware canonical app at frontend/. Single
    # job, no matrix.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm, cache-dependency-path: 'frontend/pnpm-lock.yaml' }
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Typecheck
        working-directory: frontend
        run: pnpm check || true
      - name: Build
        working-directory: frontend
        run: pnpm build

  # Chart publishing is owned by .github/workflows/publish-images.yml
  # (fires on push to main and v* tags). Keeping a single source of
  # truth avoids the previous split: this workflow did tag-only,
  # publish-images did every-push. Two paths → drift risk.
