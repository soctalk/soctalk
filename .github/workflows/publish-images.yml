name: Publish Images and Charts

# Builds and publishes:
#   - Four container images at ghcr.io/soctalk/soctalk-*
#     tagged `latest` + short SHA (+ release version on `v*` tags).
#   - Three Helm charts (soctalk-system, soctalk-tenant, wazuh) as OCI
#     artifacts at ghcr.io/soctalk/charts/<chart>, tagged with the
#     Chart.yaml version. Helm OCI doesn't have a `latest` tag — to
#     publish a new chart version, bump `version:` in Chart.yaml.
#
# Triggered on:
#   - push to main         → publishes images (charts only if Chart.yaml version is new)
#   - push of a `v*` tag   → adds the release version as an image tag
#   - workflow_dispatch    → manual button; useful for the first publish
#
# First-time setup: after the first successful run, flip each ghcr package
# to public visibility at https://github.com/orgs/soctalk/packages
# (or via `gh api -X PATCH /orgs/soctalk/packages/container/<name> -f visibility=public`).

on:
  push:
    branches: [main]
    tags: ['v*']
    # Skip image rebuilds when the change touches only docs, tests, or
    # the soctalk-docs site. Saves CI minutes and avoids re-publishing
    # the same image bits on a doc tweak.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tests/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/v1-ci.yml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (e.g. 0.1.0). Always also tagged `latest` and short SHA."
        required: false
        default: ""

permissions:
  contents: write   # needed by the ``release`` job to create the GH Release
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: soctalk-api
            dockerfile: Dockerfile
            context: .
          - image: soctalk-app-ui
            dockerfile: Dockerfile.app
            context: .
          - image: soctalk-orchestrator
            dockerfile: Dockerfile.orchestrator
            context: .
          - image: soctalk-adapter
            dockerfile: Dockerfile.adapter
            context: .
          - image: soctalk-linux-ep
            dockerfile: attack-simulator/Dockerfile
            context: attack-simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          image="ghcr.io/soctalk/${{ matrix.image }}"
          short_sha="${GITHUB_SHA::7}"
          tags=("$image:latest" "$image:$short_sha")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            tags+=("$image:$ver")
          fi
          if [[ -n "${{ inputs.tag }}" ]]; then
            tags+=("$image:${{ inputs.tag }}")
          fi
          printf '%s\n' "${tags[@]}"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false

  charts:
    runs-on: ubuntu-latest
    # Charts publish independently of images; they don't need images to
    # build, only to run. So we don't `needs: build`.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to ghcr.io (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push charts
        run: |
          set -euo pipefail
          mkdir -p /tmp/helm-out

          # soctalk-tenant depends on wazuh + linux-ep via file:// refs.
          # `helm package` won't traverse those without a resolved deps
          # directory, so run `dependency update` first — it copies the
          # referenced sibling charts into charts/soctalk-tenant/charts/.
          echo "::group::dependency update soctalk-tenant"
          helm dependency update charts/soctalk-tenant
          echo "::endgroup::"

          for chart in soctalk-system soctalk-tenant wazuh linux-ep; do
            echo "::group::package $chart"
            helm package "charts/$chart" --destination /tmp/helm-out
            echo "::endgroup::"
          done

          for tgz in /tmp/helm-out/*.tgz; do
            echo "::group::push $tgz"
            # `helm push` is idempotent: pushing the same chart version
            # twice is a no-op (artifact already exists in registry).
            # To publish a new version, bump `version:` in Chart.yaml.
            helm push "$tgz" oci://ghcr.io/soctalk/charts
            echo "::endgroup::"
          done

  release:
    # Cuts a GitHub Release for every ``v*`` tag push, after the image
    # matrix + chart push both succeed. Without this the tag exists on
    # GitHub and the images ship to ghcr.io, but ``gh release view`` is
    # empty and the /releases page has no entry — confusing for anyone
    # who lands there expecting the published artifact manifest. Body
    # lists each image's pull ref + the chart OCI refs at this version
    # so consumers don't have to grep `ghcr.io` manually.
    name: GitHub Release
    needs: [build, charts]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so release notes can diff vs prior tag

      - name: Compose release body
        id: body
        run: |
          set -euo pipefail
          ver="${GITHUB_REF#refs/tags/v}"

          # Previous v* tag for the auto-generated change log range.
          prev_tag="$(
            git tag -l 'v*' --sort=-v:refname \
              | grep -v "^v${ver}\$" \
              | head -n1 \
            || true
          )"

          {
            echo "## Container images"
            echo
            echo "All published to \`ghcr.io/soctalk\` and tagged \`${ver}\`, \`<short-sha>\`, and \`latest\`."
            echo
            for img in soctalk-api soctalk-app-ui soctalk-adapter soctalk-orchestrator soctalk-linux-ep; do
              echo "- \`ghcr.io/soctalk/${img}:${ver}\`"
            done
            echo
            echo "## Helm charts (OCI)"
            echo
            echo "Pulled via \`helm pull oci://ghcr.io/soctalk/charts/<chart> --version <ver>\`."
            echo
            for chart in soctalk-system soctalk-tenant wazuh linux-ep; do
              chart_ver="$(grep -E '^version:' "charts/${chart}/Chart.yaml" | awk '{print $2}')"
              echo "- \`oci://ghcr.io/soctalk/charts/${chart}\` @ \`${chart_ver}\`"
            done
            echo
            if [[ -n "${prev_tag}" ]]; then
              echo "## Changes since ${prev_tag}"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${prev_tag}..v${ver}" \
                | head -n 200
              echo
            fi
          } > body.md
          echo "path=body.md" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF#refs/tags/v}"
          # Idempotent: ``gh release create`` errors if the release
          # already exists, so fall back to ``edit`` to refresh the
          # body when the tag is re-pushed or the workflow is replayed.
          if gh release view "v${ver}" --json tagName >/dev/null 2>&1; then
            gh release edit "v${ver}" \
              --title "v${ver}" \
              --notes-file body.md
          else
            gh release create "v${ver}" \
              --title "v${ver}" \
              --notes-file body.md
          fi

