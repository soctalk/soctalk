name: Publish Images and Charts

# Continuous publish on main. Builds and publishes:
#   - Five container images at ghcr.io/soctalk/soctalk-* tagged `latest`
#     + short SHA. Versioned (X.Y.Z) release images are cut separately by
#     `cut-k8s-release.yml`.
#   - Four Helm charts (soctalk-system, soctalk-tenant, wazuh, linux-ep)
#     as OCI artifacts at ghcr.io/soctalk/charts/<chart>, tagged with the
#     Chart.yaml version. Helm OCI doesn't have a `latest` tag — to
#     publish a new chart version, bump `version:` in Chart.yaml.
#
# Triggered on:
#   - push to main         → publishes `latest`+sha images (charts only if Chart.yaml version is new)
#   - workflow_dispatch    → manual button; useful for the first publish
#
# Versioned releases (images + charts + GitHub Release): use the
# `cut-k8s-release.yml` action. Demo VM images: `build-packer-images.yml`.
#
# First-time setup: after the first successful run, flip each ghcr package
# to public visibility at https://github.com/orgs/soctalk/packages
# (or via `gh api -X PATCH /orgs/soctalk/packages/container/<name> -f visibility=public`).

on:
  push:
    branches: [main]
    # Versioned releases (X.Y.Z-tagged images + charts + GitHub Release)
    # are cut by the dedicated `cut-k8s-release.yml` action, NOT by a tag
    # push here — so cutting a k8s release stays decoupled from the Packer
    # VM build. This workflow only publishes the moving `latest` + short-
    # sha images and the current Chart.yaml chart versions on every main
    # push (which is what auto-updates demo via deploy-demo.yml).
    # Skip image rebuilds when the change touches only docs, tests, or
    # the soctalk-docs site. Saves CI minutes and avoids re-publishing
    # the same image bits on a doc tweak.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tests/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/v1-ci.yml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (e.g. 0.1.0). Always also tagged `latest` and short SHA."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: soctalk-api
            dockerfile: Dockerfile
            context: .
          - image: soctalk-app-ui
            dockerfile: Dockerfile.app
            context: .
          - image: soctalk-orchestrator
            dockerfile: Dockerfile.orchestrator
            context: .
          - image: soctalk-adapter
            dockerfile: Dockerfile.adapter
            context: .
          - image: soctalk-linux-ep
            dockerfile: attack-simulator/Dockerfile
            context: attack-simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          image="ghcr.io/soctalk/${{ matrix.image }}"
          short_sha="${GITHUB_SHA::7}"
          tags=("$image:latest" "$image:$short_sha")
          if [[ -n "${{ inputs.tag }}" ]]; then
            tags+=("$image:${{ inputs.tag }}")
          fi
          printf '%s\n' "${tags[@]}"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false

  charts:
    runs-on: ubuntu-latest
    # Charts publish independently of images; they don't need images to
    # build, only to run. So we don't `needs: build`.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to ghcr.io (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push charts
        run: |
          set -euo pipefail
          mkdir -p /tmp/helm-out

          # soctalk-tenant depends on wazuh + linux-ep via file:// refs.
          # `helm package` won't traverse those without a resolved deps
          # directory, so run `dependency update` first — it copies the
          # referenced sibling charts into charts/soctalk-tenant/charts/.
          echo "::group::dependency update soctalk-tenant"
          helm dependency update charts/soctalk-tenant
          echo "::endgroup::"

          for chart in soctalk-system soctalk-tenant wazuh linux-ep; do
            echo "::group::package $chart"
            helm package "charts/$chart" --destination /tmp/helm-out
            echo "::endgroup::"
          done

          for tgz in /tmp/helm-out/*.tgz; do
            echo "::group::push $tgz"
            # `helm push` is idempotent: pushing the same chart version
            # twice is a no-op (artifact already exists in registry).
            # To publish a new version, bump `version:` in Chart.yaml.
            helm push "$tgz" oci://ghcr.io/soctalk/charts
            echo "::endgroup::"
          done

