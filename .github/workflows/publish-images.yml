name: Publish Images

# Builds and publishes the four soctalk container images to GitHub Container
# Registry (ghcr.io/gbrigandi/soctalk-*). Triggered on:
#   - push to main         → tags `latest` + commit SHA
#   - push of a `v*` tag   → tags `latest`, the version, and the commit SHA
#   - workflow_dispatch    → manual button; useful for the first publish
#
# The four images correspond to the chart values in:
#   charts/soctalk-system/values.yaml  (api, app-ui)
#   charts/soctalk-tenant/values.yaml  (orchestrator, adapter)
#
# First-time setup: after the first successful run, flip each of the four
# packages to public visibility at
#   https://github.com/users/gbrigandi/packages
# (or via `gh api -X PATCH /user/packages/container/<name> -f visibility=public`).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (e.g. 0.1.0). Always also tagged `latest` and short SHA."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: soctalk-api
            dockerfile: Dockerfile
          - image: soctalk-app-ui
            dockerfile: Dockerfile.app
          - image: soctalk-orchestrator
            dockerfile: Dockerfile.orchestrator
          - image: soctalk-adapter
            dockerfile: Dockerfile.adapter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          image="ghcr.io/gbrigandi/${{ matrix.image }}"
          short_sha="${GITHUB_SHA::7}"
          tags=("$image:latest" "$image:$short_sha")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            tags+=("$image:$ver")
          fi
          if [[ -n "${{ inputs.tag }}" ]]; then
            tags+=("$image:${{ inputs.tag }}")
          fi
          printf '%s\n' "${tags[@]}"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false
