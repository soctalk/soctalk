name: Deploy to demo.soctalk.ai

# Auto-deploys the freshly-built images to the demo box and runs the
# Playwright onboarding smoke test against it.
#
# Triggered automatically after Publish Images and Charts succeeds on
# main. Can also be invoked manually via workflow_dispatch.
#
# Required secrets (set via `gh secret set`):
#   DEMO_HOST           e.g. demo.soctalk.ai  (or an IP, e.g. 116.203.201.40)
#   DEMO_SSH_USER       e.g. root
#   DEMO_SSH_KEY        private SSH key with access to the demo node
#   DEMO_ADMIN_EMAIL    bootstrap admin email (for the smoke test)
#   DEMO_ADMIN_PW       bootstrap admin password
#
# Required vars (set via `gh variable set`):
#   DEMO_BASE_URL       https://demo.soctalk.ai (defaults to https://${{ secrets.DEMO_HOST }})
#
# This is a FULL chart reconcile, not an image roll: every push runs
# `helm upgrade --install` of the published soctalk-system chart, so new
# templates, RBAC, NetworkPolicy, config, and image tags all apply. The
# chart is pulled from ghcr.io/soctalk/charts (verifying the publish
# pipeline produced it); pods pull images from ghcr.io/soctalk. A
# completeness gate then fails the deploy if any soctalk-system container
# can't pull its image. `--atomic` rolls back on failure.

on:
  workflow_run:
    workflows: ["Publish Images and Charts"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      chart_version:
        description: "soctalk-system chart version to deploy (default: Chart.yaml version)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  deploy:
    # Only run when the upstream workflow succeeded (or when manually fired).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run gives us the SHA of the originating run; use it.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve chart version
        id: resolve
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.chart_version }}" ]]; then
            ver="${{ inputs.chart_version }}"
          else
            ver="$(grep -E '^version:' charts/soctalk-system/Chart.yaml | awk '{print $2}')"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Deploying soctalk-system chart version: $ver"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEMO_SSH_KEY }}" > ~/.ssh/id_demo
          chmod 600 ~/.ssh/id_demo
          ssh-keyscan -H "${{ secrets.DEMO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy values to demo node
        run: |
          scp -i ~/.ssh/id_demo -o StrictHostKeyChecking=accept-new \
            deploy/demo-values.yaml \
            "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_HOST }}:/tmp/demo-values.yaml"

      - name: helm upgrade --install soctalk-system
        env:
          VER: ${{ steps.resolve.outputs.version }}
          ADMIN_EMAIL: ${{ secrets.DEMO_ADMIN_EMAIL }}
          ADMIN_PW: ${{ secrets.DEMO_ADMIN_PW }}
        run: |
          set -euo pipefail
          # Full chart reconcile from the published OCI chart. --install
          # bootstraps if absent; --atomic rolls back on any failure;
          # --wait blocks until the release's workloads are Ready. The
          # bootstrap admin creds are injected here, never written to the
          # committed values file. SSH keepalive survives slow rollouts.
          ssh -i ~/.ssh/id_demo \
              -o StrictHostKeyChecking=accept-new \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=40 \
              "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_HOST }}" \
              "set -euo pipefail
               export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
               helm upgrade --install soctalk-system \
                 oci://ghcr.io/soctalk/charts/soctalk-system \
                 --version '$VER' \
                 --namespace soctalk-system --create-namespace \
                 -f /tmp/demo-values.yaml \
                 --set-string install.bootstrapAdmin.email='$ADMIN_EMAIL' \
                 --set-string install.bootstrapAdmin.password='$ADMIN_PW' \
                 --wait --timeout 8m
               rm -f /tmp/demo-values.yaml"

      - name: Diagnose on failure (pod/events — survives atomic rollback)
        if: failure()
        run: |
          set +e
          # helm --atomic rolls back the failed pods, but Events linger briefly
          # and reveal WHY the new image didn't become Ready — image-pull errors,
          # FailedScheduling (node out of memory from accumulated tenant stacks),
          # or a crashing api/db-init container. Best-effort; never fails the job.
          ssh -i ~/.ssh/id_demo -o StrictHostKeyChecking=accept-new \
              "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_HOST }}" \
              "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
               echo '=== nodes (allocatable vs used) ==='
               kubectl top nodes 2>/dev/null || kubectl describe nodes | grep -A6 'Allocated resources' | head -20
               echo '=== soctalk-system pods ==='
               kubectl -n soctalk-system get pods -o wide
               echo '=== recent events ==='
               kubectl -n soctalk-system get events --sort-by=.lastTimestamp | tail -40
               echo '=== non-running tenant namespaces (accumulated backlog) ==='
               kubectl get ns | grep -cE 'tenant-|wazuh-' || true
               echo '=== api deploy describe (tail) ==='
               kubectl -n soctalk-system describe deploy/soctalk-system-api | tail -20
               crash=\$(kubectl -n soctalk-system get pods --sort-by=.metadata.creationTimestamp -o name | grep api | tail -1)
               echo \"=== newest api pod: \$crash ===\"
               echo '--- db-init (migrations) logs ---'
               kubectl -n soctalk-system logs \$crash -c db-init --tail=60 2>&1 | tail -30
               echo '--- api container logs (current) ---'
               kubectl -n soctalk-system logs \$crash -c api --tail=150 2>&1 | tail -80
               echo '--- api container logs (previous crash) ---'
               kubectl -n soctalk-system logs \$crash -c api --previous --tail=150 2>&1 | tail -80" || true

      - name: Force rollout so the moving `latest` tag is re-pulled
        run: |
          set -euo pipefail
          # helm upgrade does NOT restart pods when the release spec is
          # unchanged, and a moving `latest` tag keeps the same spec every
          # push — so without an explicit rollout the running pods keep the
          # stale cached image and new code never reaches the demo. Restart
          # the app deployments (NOT postgres) and wait for them to become
          # Ready on the freshly pulled image. pullPolicy:Always (demo-values)
          # guarantees the restart re-pulls rather than reusing the node cache.
          ssh -i ~/.ssh/id_demo \
              -o StrictHostKeyChecking=accept-new \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=40 \
              "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_HOST }}" \
              "set -euo pipefail
               export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
               for d in soctalk-system-api soctalk-system-app-ui; do
                 kubectl -n soctalk-system rollout restart deploy/\$d
               done
               for d in soctalk-system-api soctalk-system-app-ui; do
                 kubectl -n soctalk-system rollout status deploy/\$d --timeout=5m
               done"

      - name: Completeness gate (no image-pull failures)
        run: |
          set -euo pipefail
          # helm --wait already gated readiness of the release's workloads.
          # This explicitly fails the deploy if ANY soctalk-system container
          # is stuck pulling its image — the exact class of breakage
          # (unpublished tag, private package) a chart reconcile must catch.
          ssh -i ~/.ssh/id_demo \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_HOST }}" \
              "set -euo pipefail
               export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
               bad=\$(kubectl -n soctalk-system get pods \
                 -o jsonpath='{range .items[*].status.containerStatuses[*]}{.state.waiting.reason}{\"\n\"}{end}' \
                 2>/dev/null | grep -cE 'ImagePullBackOff|ErrImagePull|InvalidImageName' || true)
               if [ \"\$bad\" -gt 0 ]; then
                 echo '::error::soctalk-system has containers failing image pull'
                 kubectl -n soctalk-system get pods | grep -E 'ImagePull|ErrImage|InvalidImage' || true
                 exit 1
               fi
               echo 'completeness gate OK: all soctalk-system images pulled'
               kubectl -n soctalk-system get pods"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run smoke test
        env:
          SMOKE_BASE_URL: ${{ vars.DEMO_BASE_URL || format('https://{0}', secrets.DEMO_HOST) }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.DEMO_ADMIN_EMAIL }}
          SMOKE_ADMIN_PW: ${{ secrets.DEMO_ADMIN_PW }}
          SMOKE_SLUG_PREFIX: ci
        run: python tests/e2e/smoke_onboard.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: /tmp/onboard-shots/
          if-no-files-found: ignore
