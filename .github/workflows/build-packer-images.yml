name: Build Packer Demo Images

# Builds the SocTalk demo VM image via Packer. Currently only the QEMU
# (QCOW2) source is built in CI — the AWS AMI source needs AWS creds
# wired up separately.
#
# Trigger:
#   * workflow_dispatch ONLY — VM image builds are a deliberate, separate
#     step from cutting the k8s release. Cut + validate the k8s artifacts
#     first (see cut-k8s-release.yml, which auto-updates demo), then run
#     this action with the SAME version to build the demo VM images and
#     attach them to the matching vX.Y.Z GitHub Release.
#
# Deliverables (EVERY run — the verify gate fails the build if any is
# missing, so a release can never ship a partial set):
#   * compressed disks: qcow2, vmdk, vhdx, vhd, raw (+ SHA256SUMS)
#   * soctalk-demo-<ver>.ova — VMware/vSphere one-step deploy (Deploy OVF
#     Template / ovftool / govc import.ova); built unconditionally from the
#     streamOptimized vmdk by scripts/make-ova.sh in the packer
#     post-processor. Running build-packer for a release ALWAYS yields an OVA.
#
# Image builds are expensive (~10-15 min + nontrivial CI minutes +
# multi-GB artifacts) and must never race the chart publish, so this
# workflow is manual-only — never fires on a push or tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.2.0). Used in filename + AMI name; also the vX.Y.Z release to attach artifacts to."
        required: false
        default: "dev"
      soctalk_chart_version:
        description: "soctalk-system chart version to pre-pull into the image. Blank = the version in Chart.yaml."
        required: false
        default: ""

permissions:
  contents: write   # for attaching artifacts to releases on v* tags

concurrency:
  group: build-packer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wizard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: setup-wizard/go.mod
          cache-dependency-path: setup-wizard/go.sum
      - name: Build wizard binary
        working-directory: setup-wizard
        run: |
          set -euo pipefail
          go build -trimpath -ldflags='-s -w' -o ../infra/packer/build-artifacts/soctalk-setup-wizard ./...
          ls -lh ../infra/packer/build-artifacts/soctalk-setup-wizard
      - uses: actions/upload-artifact@v4
        with:
          name: soctalk-setup-wizard-binary
          path: infra/packer/build-artifacts/soctalk-setup-wizard
          if-no-files-found: error
          retention-days: 14

  build-qcow2:
    needs: build-wizard
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: infra/packer
    steps:
      - uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: '1.11.2'

      - name: Install QEMU + cloud-image-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            xz-utils

      - name: Detect KVM
        id: kvm
        run: |
          # GitHub Actions ubuntu-22.04+ runners ship with nested KVM
          # since early 2024. If /dev/kvm is missing, fall back to TCG
          # (slower but works).
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "KVM available — using hardware acceleration."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "KVM unavailable — falling back to TCG emulation (slow)."
          fi

      - name: Disk space (pre-build)
        run: df -h /

      - name: Download wizard binary
        uses: actions/download-artifact@v4
        with:
          name: soctalk-setup-wizard-binary
          path: infra/packer/build-artifacts/
      - name: Mark wizard binary executable
        # working-directory above resolves to infra/packer, so this is
        # build-artifacts/soctalk-setup-wizard (NOT infra/packer/build-artifacts/...)
        run: |
          chmod 755 build-artifacts/soctalk-setup-wizard
          ls -lh build-artifacts/

      - name: packer init
        run: packer init .

      - name: Compute artifact + chart versions
        id: ver
        run: |
          set -euo pipefail
          # Artifact version: on v* tag push, strip the leading 'v' so
          # filenames match the container-image tagging convention
          # (0.1.2 not v0.1.2). Otherwise honor the workflow_dispatch
          # input or fall back to 'dev' (so ad-hoc manual builds get a
          # clearly-non-release filename).
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ inputs.version }}"
            [[ -z "$v" ]] && v="dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

          # Chart version: on tag push, track the tag; on workflow_dispatch
          # honor an explicit input; otherwise fall back to whatever is
          # currently in soctalk-system/Chart.yaml (the actually-published
          # version) so the manual build can ``helm pull`` something real
          # instead of asking for ``--version dev`` and failing.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            cv="$v"
          else
            cv="${{ inputs.soctalk_chart_version }}"
            if [[ -z "$cv" ]]; then
              cv="$(awk '/^version:/ {print $2; exit}' \
                /home/runner/work/soctalk/soctalk/charts/soctalk-system/Chart.yaml)"
              # Fallback to repo-relative path when CHECKOUT_PATH differs.
              [[ -z "$cv" ]] && cv="$(awk '/^version:/ {print $2; exit}' \
                "${GITHUB_WORKSPACE}/charts/soctalk-system/Chart.yaml")"
            fi
          fi
          echo "chart_version=$cv" >> "$GITHUB_OUTPUT"
          echo "Using artifact version=$v chart_version=$cv"

      - name: packer validate
        env:
          PKR_VAR_version: ${{ steps.ver.outputs.version }}
          PKR_VAR_soctalk_chart_version: ${{ steps.ver.outputs.chart_version }}
        run: packer validate .

      - name: packer build (qemu source)
        env:
          PKR_VAR_version: ${{ steps.ver.outputs.version }}
          PKR_VAR_soctalk_chart_version: ${{ steps.ver.outputs.chart_version }}
          # Packer's QEMU builder honors PACKER_LOG=1 for verbose output.
          PACKER_LOG: '1'
        run: |
          # If KVM unavailable, the .pkr.hcl's accelerator="kvm" would
          # error out. Override to tcg via -var when that's the case.
          if [ "${{ steps.kvm.outputs.available }}" = "true" ]; then
            packer build -only="soctalk-demo.qemu.soctalk_demo" .
          else
            # Override accelerator via env (Packer doesn't expose CLI
            # var-overrides for nested block fields, so we'd need a
            # variable in the .pkr.hcl. For the starter we rely on KVM
            # being available on modern runners — if this branch is
            # hit, file an issue and we'll plumb a `qemu_accelerator`
            # variable through soctalk-demo.pkr.hcl.
            echo "::error::KVM unavailable; TCG fallback not yet wired up. Re-run on a KVM-capable runner."
            exit 1
          fi

      - name: Disk space (post-build)
        if: always()
        run: df -h /

      - name: Verify all formats produced + sizes
        run: |
          ls -lh build/dist/
          # The post-processor emits qcow2, vmdk, vhdx, vhd, raw + an ova.
          # Fail fast if any one is missing so we don't ship a partial release.
          for ext in qcow2 vmdk vhdx vhd raw ova; do
            test -f "build/dist/soctalk-demo-${{ steps.ver.outputs.version }}.${ext}" \
              || { echo "::error::missing build/dist/*.${ext}"; exit 1; }
          done

      - name: Compress all formats (xz -9, parallel)
        run: |
          # raw and vhd are sparse-friendly; xz crushes both. vmdk
          # streamOptimized is already deflate-compressed but xz still
          # gains ~5-10% — worth it for download size.
          cd build/dist
          # NB: the .ova is left uncompressed — its vmdk is already
          # streamOptimized-compressed and OVAs deploy as-is (an .ova.xz would
          # force a manual decompress before "Deploy OVF Template").
          for f in *.qcow2 *.vmdk *.vhdx *.vhd *.raw; do
            echo "==> compressing $f"
            xz -T0 -9 "$f"
          done
          ls -lh

      - name: Compute SHA256 sums
        run: |
          cd build/dist
          sha256sum *.xz *.ova > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload qcow2 artifact (KVM / Proxmox / libvirt)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-qcow2
          path: infra/packer/build/dist/*.qcow2.xz
          retention-days: 1
          if-no-files-found: error

      - name: Upload vmdk artifact (VMware / VirtualBox)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-vmdk
          path: infra/packer/build/dist/*.vmdk.xz
          retention-days: 1
          if-no-files-found: error

      - name: Upload ova artifact (VMware ESXi / vSphere, one-step deploy)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-ova
          path: infra/packer/build/dist/*.ova
          retention-days: 1
          if-no-files-found: error

      - name: Upload vhdx artifact (Hyper-V)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-vhdx
          path: infra/packer/build/dist/*.vhdx.xz
          retention-days: 1
          if-no-files-found: error

      - name: Upload vhd artifact (Azure)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-vhd
          path: infra/packer/build/dist/*.vhd.xz
          retention-days: 1
          if-no-files-found: error

      - name: Upload raw artifact (generic cloud import)
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-raw
          path: infra/packer/build/dist/*.raw.xz
          retention-days: 1
          if-no-files-found: error

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: soctalk-demo-checksums
          path: infra/packer/build/dist/SHA256SUMS.txt
          retention-days: 1
          if-no-files-found: error

      - name: Attach all formats to the vX.Y.Z GitHub Release
        # Only for a real versioned build (not ad-hoc `dev`). Upload with the
        # gh CLI (same path cut-k8s-release.yml uses to create the release with
        # the default GITHUB_TOKEN — proven to work). softprops/action-gh-release
        # was resolving the ref to refs/heads/main on this dispatch-only workflow
        # and 403'ing ("Resource not accessible by integration"); addressing the
        # release by its explicit vX.Y.Z tag via gh avoids that. --clobber lets a
        # re-run replace existing assets.
        if: ${{ inputs.version != '' && inputs.version != 'dev' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          shopt -s nullglob
          files=(infra/packer/build/dist/*.xz infra/packer/build/dist/*.ova infra/packer/build/dist/SHA256SUMS.txt)
          echo "attaching ${#files[@]} assets to v${ver}:"; printf '  %s\n' "${files[@]}"
          gh release upload "v${ver}" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  boot-test:
    # Boot the qcow2 in a fresh KVM VM, wait for soctalk-firstboot to
    # complete, then run the Playwright validator against the SocTalk
    # control plane via SSH-tunneled kubectl port-forwards. Fails the
    # workflow if the image is broken so we don't ship it.
    needs: build-qcow2
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: infra/packer
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + cloud-image-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils xz-utils

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Download QCOW2 artifact
        uses: actions/download-artifact@v4
        with:
          name: soctalk-demo-qcow2
          path: infra/packer/

      - name: Decompress qcow2
        run: |
          xz -d *.qcow2.xz
          ls -lh *.qcow2

      - name: Generate ephemeral SSH key + seed.iso
        run: |
          ssh-keygen -t ed25519 -N '' -f bt_key -C 'boot-test@github-actions'
          SSH_PUBKEY="$(cat bt_key.pub)" envsubst < tests/test-user-data.template.yaml > user-data
          echo "instance-id: boot-test" > meta-data
          cloud-localds seed.iso user-data meta-data
          ls -la seed.iso bt_key bt_key.pub

      - name: Boot VM in background
        run: |
          set -euo pipefail
          QCOW=$(ls *.qcow2 | head -1)
          nohup qemu-system-x86_64 -name boot-test \
            -m 8G -smp 2 -enable-kvm -cpu host \
            -drive file=$QCOW,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio,readonly=on \
            -netdev user,id=net0,hostfwd=tcp::8022-:22 \
            -device virtio-net,netdev=net0 \
            -nographic -display none \
            -serial file:qemu.log \
            >/dev/null 2>&1 &
          echo $! > qemu.pid
          echo "QEMU pid $(cat qemu.pid)"

      - name: Wait for SSH on VM
        run: |
          set -e
          for i in $(seq 1 60); do
            if ssh -i bt_key -o StrictHostKeyChecking=accept-new \
                   -o ConnectTimeout=3 -o BatchMode=yes \
                   -p 8022 ops@127.0.0.1 'true' 2>/dev/null; then
              echo "SSH up after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "SSH never came up — serial console tail:"
          tail -50 qemu.log
          exit 1

      - name: Wait for soctalk-firstboot
        run: |
          set -e
          # firstboot.service has RemainAfterExit=yes so ActiveState stays
          # "active" after a clean exit — that's why we key off SubState +
          # Result instead. SubState=exited + Result=success is the
          # unambiguous "ran once and finished ok" signal. SubState=failed
          # or Result=failed is the terminal failure signal.
          for i in $(seq 1 30); do
            eval "$(ssh -i bt_key -p 8022 -o BatchMode=yes ops@127.0.0.1 \
                    'systemctl show soctalk-firstboot --property=SubState,Result' 2>/dev/null || true)"
            echo "t+${i}m SubState=${SubState:-?} Result=${Result:-?}"
            if [ "${SubState:-}" = "exited" ] && [ "${Result:-}" = "success" ]; then
              echo "soctalk-firstboot completed successfully"
              exit 0
            fi
            if [ "${SubState:-}" = "failed" ] || [ "${Result:-}" = "failed" ]; then
              echo "firstboot FAILED:"
              ssh -i bt_key -p 8022 ops@127.0.0.1 \
                'sudo journalctl -u soctalk-firstboot --no-pager -n 50'
              exit 1
            fi
            sleep 60
          done
          echo "firstboot didn't complete in 30 minutes"
          ssh -i bt_key -p 8022 ops@127.0.0.1 \
            'sudo journalctl -u soctalk-firstboot --no-pager -n 50' || true
          exit 1

      - name: Confirm pods are Running
        run: |
          ssh -i bt_key -p 8022 ops@127.0.0.1 \
            'sudo kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml -n soctalk-system get pods'

      - name: Start kubectl port-forwards inside VM
        run: |
          set -e
          ssh -i bt_key -p 8022 ops@127.0.0.1 \
            'sudo bash -c "setsid kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml -n soctalk-system port-forward svc/soctalk-system-app-ui 3000:3000 >/tmp/pf-ui.log 2>&1 </dev/null &"; \
             sudo bash -c "setsid kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml -n soctalk-system port-forward svc/soctalk-system-api 8000:8000 >/tmp/pf-api.log 2>&1 </dev/null &"'
          sleep 3
          ssh -i bt_key -p 8022 ops@127.0.0.1 'cat /tmp/pf-ui.log /tmp/pf-api.log'

      - name: Open laptop->VM SSH tunnels
        run: |
          ssh -i bt_key -p 8022 -L 3000:localhost:3000 -L 8000:localhost:8000 \
              -N -f -o ExitOnForwardFailure=yes ops@127.0.0.1
          sleep 1
          ss -tlnp 2>/dev/null | grep -E ':3000|:8000' || true

      - name: Run Playwright validator
        env:
          QCOW_UI_URL: http://localhost:3000
          QCOW_API_URL: http://localhost:8000
        run: python tests/qcow_validate.py

      - name: Upload validation screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qcow-validate-screenshot
          path: /tmp/qcow-validate.png
          if-no-files-found: ignore

      - name: Upload qemu serial log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qcow-validate-qemu-log
          path: infra/packer/qemu.log
          if-no-files-found: ignore

      - name: Tear down VM
        if: always()
        run: |
          [ -f qemu.pid ] && sudo kill $(cat qemu.pid) 2>/dev/null || true
