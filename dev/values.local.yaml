# dev/values.local.yaml — overrides for the slim k3d 'soctalk-local' profile
# Used by ``just system-up`` / ``just system-reload``. Brings up
# soctalk-system on top of scripts/local-up.sh's cluster (nginx-only,
# no Cilium, no cert-manager, ingress on 127.0.0.1:8080).
#
# /etc/hosts entries required (see CONTRIBUTING.md):
#   127.0.0.1 devlab.soctalk.local customer.soctalk.local
#
# LLM credentials: NOT committed. Either edit this file locally and
# leave the edit unstaged, or pass via ``--set`` at install time:
#   helm upgrade --install soctalk-system charts/soctalk-system \
#       -n soctalk-system -f dev/values.local.yaml \
#       --set llm.apiKey=sk-...

install:
  # Fixed dev UUIDs so the bootstrap row is stable across re-installs.
  # The "dec0de00" prefix makes them obviously fake when they show up
  # in logs / audit tables; rotation in any non-local environment.
  msspId: 'dec0de00-0000-4000-8000-000000000001'
  msspName: 'DevLab'
  msspSlug: 'devlab'
  installId: 'dec0de00-0000-4000-8000-000000000002'
  installLabel: 'dev-local'
  bootstrapAdmin:
    email: 'admin@devlab.local'
    displayName: 'DevLab Admin'
    # Dev-only — anyone with the repo can read this. Production
    # installs MUST use ``existingSecret`` + a real password.
    password: 'dev-admin-pw-12345'

image:
  # Matches the ``cr.lab.atricore.io`` registry prefix that
  # ``just build-*`` tags into. ``k3d image import`` (called by
  # ``just system-up``) loads these into the cluster's containerd
  # so this registry doesn't have to be reachable from the cluster.
  registry: cr.lab.atricore.io
  tag: latest
  pullPolicy: IfNotPresent

ingress:
  # local-up.sh installs nginx-ingress in the ``ingress-system``
  # namespace with ingressClassName=nginx. The chart's default
  # ``traefik`` was for k3s's bundled controller (disabled by
  # dev-up.sh and not present here either).
  className: nginx
  tls:
    secretName: ''
    issuerRef: ''
  hostnames:
    mssp: devlab.soctalk.local
    customer: customer.soctalk.local
  # Slug-driven per-tenant landing: anything matching the wildcard
  # routes to /api/public/scope-by-slug.
  tenantWildcard: '*.soctalk.local'

auth:
  # The browser hits ``http://devlab.soctalk.local:8080`` (no TLS, port
  # in the origin). Session cookies must not require Secure; CSRF must
  # accept the port-suffixed origin.
  cookieSecure: false
  publicOriginOverride: 'http://devlab.soctalk.local:8080,http://customer.soctalk.local:8080'

networkPolicy:
  cilium: false

preInstallCheck:
  # local-up.sh doesn't install Cilium or cert-manager; the chart's
  # pre-install Job would flag both as missing and abort the helm
  # install. Disabled here is the documented escape hatch for local
  # / CI-style installs where the preflight invariants don't apply.
  enabled: false

llm:
  # Set via --set llm.apiKey=sk-... at install time, or edit this file
  # locally and leave the change unstaged. Triage / orchestrator pods
  # will boot regardless; LLM calls just fail until a key is provided.
  apiKey: ''
