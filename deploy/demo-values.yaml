# Helm values for the demo.soctalk.ai install.
#
# Values-as-code: this is the full, reviewable config the deploy-demo
# workflow applies on every push via `helm upgrade --install`. It must
# contain NO secrets — the bootstrap admin email + password are injected
# at deploy time from the DEMO_ADMIN_EMAIL / DEMO_ADMIN_PW GitHub secrets
# (`--set install.bootstrapAdmin.email=... --set ...password=...`).
#
# All images pull from ghcr.io/soctalk (the org namespace, where
# publish-images.yml publishes them) — NOT a personal namespace.

image:
  registry: ghcr.io/soctalk   # → ghcr.io/soctalk/soctalk-{api,app-ui,...}:<tag>
  tag: latest                 # demo tracks head of main
  # MUST be Always for a moving `latest` tag: with IfNotPresent (the chart
  # default) the node caches the first `latest` it pulls and NEVER re-pulls,
  # so every deploy silently runs stale code — the reason the demo ran
  # provisioning logic weeks behind main. Paired with a rollout-restart in
  # deploy-demo.yml (helm upgrade alone won't restart pods on an unchanged spec).
  pullPolicy: Always

ingress:
  enabled: true
  className: traefik
  # The demo runs k3s with its bundled Traefik in kube-system, so the
  # api/ui ingress NetworkPolicies must admit that namespace (the chart
  # default `ingress-system` would firewall Traefik out → 502).
  controllerNamespace: kube-system
  tls:
    issuerRef: letsencrypt-prod
    secretName: soctalk-tls
  hostnames:
    mssp: demo.soctalk.ai
    customer: demo.soctalk.ai

install:
  msspName: PoC Demo Tenant
  installLabel: poc
  bootstrapAdmin:
    # email + password injected from secrets at deploy time (see header).
    {}

# Hybrid model chain for the demo: every new tenant's FAST/router tier runs on a
# self-hosted Qwen3-32B (SGLang on Modal, scale-to-zero A100), while the
# reasoning verdict + chat run on the primary provider below. The install LLM
# key is an Anthropic key (sk-ant-…), so the primary must be anthropic —
# claude-sonnet-4-6 — otherwise gpt-4o calls 401 against the wrong-vendor key.
# The Qwen bearer key is NOT here — it lives in the Secret named below, created
# out of band (kubectl create secret ... soctalk-qwen-fast-tier). See
# tenants.py::_install_default_llm_tiers.
defaults:
  llm:
    provider: anthropic
    baseUrl: https://api.anthropic.com
    model: claude-sonnet-4-6
    fastTier:
      provider: openai-compatible
      baseUrl: https://gbrigand--soctalk-sglang-qwen3-32b-serve.modal.run/v1
      model: Qwen/Qwen3-32B
      engine: sglang
      apiKeySecret:
        name: soctalk-qwen-fast-tier
        key: api_key

postgres:
  enabled: true
  storage:
    size: 20Gi

preInstallCheck:
  enabled: false

# Override the per-tenant adapter / runs-worker image tags away from the
# render.py default (0.1.13-fixes), which is not published to public
# ghcr. Demo tenants pull :latest from ghcr.io/soctalk instead.
tenantProvisioning:
  adapterImageTag: latest
  runsWorkerImageTag: latest
  # linux-ep too: demo tracks head, and the chart default now points at
  # the (unpublished-until-release) pinned tag. Without this, a freshly
  # provisioned demo tenant's linuxep-0 pod ImagePullBackOffs and
  # wait_workloads times out (caught by the deploy smoke test).
  linuxEpImageTag: latest
