{{/*
Bootstrap secrets: generated at install time with random values when not
supplied externally. All production installs should override with
``existingSecret:`` fields in values.yaml pointing to pre-provisioned Secrets.

These generated defaults use ``randAlphaNum`` which is deterministic across helm
upgrades only if Helm's "lookup" function finds an existing Secret: see
upgrade notes.
*/}}
{{/* Postgres admin creds */}}
{{- if .Values.postgres.enabled }}
{{- $adminSecretName := printf "%s-postgres-admin-creds" .Release.Name }}
{{- $existingAdmin := (lookup "v1" "Secret" .Release.Namespace $adminSecretName) }}
{{- $adminPw := "" }}
{{- if $existingAdmin }}
{{-   $adminPw = (index $existingAdmin.data "password" | b64dec) }}
{{- else }}
{{-   $adminPw = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adminSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: soctalk_admin
  password: {{ $adminPw | quote }}
  url: {{ printf "postgresql+asyncpg://soctalk_admin:%s@%s-postgres.%s.svc.cluster.local.:5432/soctalk" $adminPw .Release.Name .Release.Namespace | quote }}
---
{{- $appSecretName := printf "%s-postgres-app-creds" .Release.Name }}
{{- $existingApp := (lookup "v1" "Secret" .Release.Namespace $appSecretName) }}
{{- $appPw := "" }}
{{- if $existingApp }}
{{-   $appPw = (index $existingApp.data "password" | b64dec) }}
{{- else }}
{{-   $appPw = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: soctalk_app
  password: {{ $appPw | quote }}
  url: {{ printf "postgresql+asyncpg://soctalk_app:%s@%s-postgres.%s.svc.cluster.local.:5432/soctalk" $appPw .Release.Name .Release.Namespace | quote }}
---
{{- $msspSecretName := printf "%s-postgres-mssp-creds" .Release.Name }}
{{- $existingMssp := (lookup "v1" "Secret" .Release.Namespace $msspSecretName) }}
{{- $msspPw := "" }}
{{- if $existingMssp }}
{{-   $msspPw = (index $existingMssp.data "password" | b64dec) }}
{{- else }}
{{-   $msspPw = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $msspSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: soctalk_mssp
  password: {{ $msspPw | quote }}
  url: {{ printf "postgresql+asyncpg://soctalk_mssp:%s@%s-postgres.%s.svc.cluster.local.:5432/soctalk" $msspPw .Release.Name .Release.Namespace | quote }}
{{- end }}
---
{{/* JWT signing key */}}
{{- $jwtSecretName := printf "%s-jwt-signing-key" .Release.Name }}
{{- $existingJwt := (lookup "v1" "Secret" .Release.Namespace $jwtSecretName) }}
{{- $jwtKey := "" }}
{{- if $existingJwt }}
{{-   $jwtKey = (index $existingJwt.data "jwt-key" | b64dec) }}
{{- else }}
{{-   $jwtKey = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-key: {{ $jwtKey | quote }}
---
{{/* Adapter JWT signing key (for adapter → API tokens) */}}
{{- $adapterSecretName := printf "%s-adapter-signing-key" .Release.Name }}
{{- $existingAdapter := (lookup "v1" "Secret" .Release.Namespace $adapterSecretName) }}
{{- $adapterKey := "" }}
{{- if $existingAdapter }}
{{-   $adapterKey = (index $existingAdapter.data "signing_key" | b64dec) }}
{{- else }}
{{-   $adapterKey = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adapterSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  signing_key: {{ $adapterKey | quote }}
{{- with (default dict .Values.install.bootstrapAdmin) }}
{{- if and (not .existingSecret) .password }}
---
{{/*
Bootstrap admin password. Materialized only when an inline password is
set and no externally-managed Secret is referenced. Production installs
keep this empty and provision the Secret out-of-band.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-bootstrap-admin
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" $ | nindent 4 }}
type: Opaque
stringData:
  email: {{ .email | quote }}
  password: {{ .password | quote }}
{{- end }}
{{- end }}
{{- with (default dict .Values.llm) }}
{{- if and (not .existingSecret) .apiKey }}
---
{{/*
Inline LLM credential. Only emitted when an apiKey is set and no
existingSecret is referenced. Production installs should keep apiKey
empty and instead create a Secret out-of-band, then point
``llm.existingSecret`` at it.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-llm-api-key
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "soctalk-system.labels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .provider "anthropic" }}
  anthropic-api-key: {{ .apiKey | quote }}
  {{- else }}
  openai-api-key: {{ .apiKey | quote }}
  {{- end }}
{{- end }}
{{- end }}
