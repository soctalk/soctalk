# Defaults for the SocTalk mock-endpoint chart.
#
# This chart deploys a StatefulSet of N attack-simulator pods. Each
# pod registers a Wazuh agent named `<release>-<ordinal>` with the
# configured Wazuh manager (typically inside the same tenant
# namespace) and executes Atomic Red Team / scripted MITRE TTPs on
# itself. The resulting Wazuh alerts are what the soctalk pipeline
# ingests and triages.

image:
  repository: ghcr.io/soctalk/soctalk-linux-ep
  tag: 0.2.0
  pullPolicy: IfNotPresent

# Number of simulated endpoints. Each registers with the Wazuh
# manager under a unique agent name (release-name plus pod ordinal).
replicas: 1

# Wazuh manager wiring. Defaults assume the tenant chart's standard
# `wazuh-<tenantSlug>-wazuh-manager` Service name lives in the same
# namespace as this release.
wazuh:
  # Cluster-DNS-resolvable hostname for the Wazuh manager 1514/1515.
  managerHost: ""          # e.g. wazuh-demo-wazuh-manager
  # Name of an existing Secret holding the authd enrollment password.
  # Typically `wazuh-<tenantSlug>-wazuh-creds` from the wazuh chart.
  credsSecret:
    name: ""
    authdPasswordKey: AUTHD_PASS

# Simulator runtime knobs (passed through as container env vars
# matching the original attack-simulator docker-compose service).
simulator:
  # Off by default — running the simulator on a customer-facing or
  # demo cluster generates real LLM spend with no business value. Set
  # to true only on dev/iteration clusters where you want synthetic
  # alert load.
  enabled: false
  attackDelay: 10           # seconds after agent enroll before the first TTP
  attackInterval: 120       # seconds between subsequent TTPs
  # Per-endpoint cap on SOCTALK_ATTACK emissions per UTC day. Every
  # emission becomes a Wazuh alert → an investigation → at least one
  # LLM call, so this is the load-bearing cost ceiling at the source.
  # 0 disables the cap (not recommended on shared clusters).
  dailyAlertCap: 30

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# The Wazuh agent + Atomic Red Team scripts in the image expect
# privileged operations (loading kernel modules in some TTPs, file
# perms tweaks, etc). Required for realistic TTP execution.
securityContext:
  privileged: true

nodeSelector: {}
tolerations: []
affinity: {}
