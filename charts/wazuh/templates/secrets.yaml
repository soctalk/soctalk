{{/*
Wazuh creds Secret. Generated once at install; preserved on upgrade so
the L1 controller's retries (which pass placeholder passwords when the
TenantSecret bootstrap row already exists) don't rotate the live API
user's credentials. Wazuh's manager validates the API password against
its complexity rules at startup; a placeholder rotation would fail and
crashloop the manager.
*/}}
{{- $secretName := printf "%s-creds" (include "wazuh.fullname" .) -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $apiPw := .Values.credentials.apiPassword -}}
{{- $authdPw := .Values.credentials.authdPassword -}}
{{- $clusterKey := .Values.credentials.clusterKey -}}
{{- $indexerPw := .Values.credentials.indexerPassword -}}
{{- if $existing }}
{{-   $apiPw = (index $existing.data "WAZUH_API_PASSWORD" | b64dec) }}
{{-   $authdPw = (index $existing.data "AUTHD_PASS" | b64dec) }}
{{-   $clusterKey = (index $existing.data "CLUSTER_KEY" | b64dec) }}
{{-   $indexerPw = (index $existing.data "INDEXER_PASSWORD" | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
type: Opaque
stringData:
  WAZUH_API_USERNAME: {{ .Values.credentials.apiUsername | quote }}
  WAZUH_API_PASSWORD: {{ $apiPw | quote }}
  INDEXER_USERNAME: {{ .Values.credentials.indexerUsername | quote }}
  INDEXER_PASSWORD: {{ $indexerPw | quote }}
  AUTHD_PASS: {{ $authdPw | quote }}
  CLUSTER_KEY: {{ $clusterKey | quote }}
