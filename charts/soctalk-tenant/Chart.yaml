apiVersion: v2
name: soctalk-tenant
description: |
  SocTalk V1 per-tenant SOC stack: one release per end-customer, installed
  by the SocTalk controller (NOT by human operators). Contains Wazuh +
  TheHive + Cortex + SocTalk adapter in a dedicated namespace with strict
  NetworkPolicy, ResourceQuota, LimitRange, per-tenant ServiceAccount,
  per-tenant Secrets and PVCs.

type: application

# Chart version is independent of application versions.
version: 0.1.9

# Application version identifier (bumped when subchart versions change)
appVersion: 0.1.0

kubeVersion: ">=1.28.0-0"

home: https://github.com/soctalk/soctalk
sources:
  - https://github.com/soctalk/soctalk

maintainers:
  - name: Gianluca Brigandi
    url: https://github.com/gbrigandi

keywords:
  - siem
  - soc
  - wazuh
  - thehive
  - cortex
  - security

annotations:
  category: Security
  licenses: Apache-2.0

# Subchart dependencies. Wazuh + linux-ep ship inline so a single helm install
# on the tenant cluster (L2) brings up the full SOC stack — required for the
# cross-cluster MSSP/L2 path where the cloud-agent runs ONE install_helm_release
# job per tenant (no second helm release to fan out into). Both are gated on
# components.<name>.enabled in values so a 'provided'-profile tenant (BYO Wazuh)
# can ship adapter-only. TheHive / Cortex stay undeclared until the chart audit
# lands their patched charts under ./charts/.
dependencies:
  - name: wazuh
    version: "0.1.1"
    repository: "file://../wazuh"
    condition: components.wazuh.enabled
  - name: linux-ep
    alias: linuxep
    version: "0.1.1"
    repository: "file://../linux-ep"
    condition: components.linuxep.enabled
