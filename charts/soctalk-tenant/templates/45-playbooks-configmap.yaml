{{- /*
  Declarative playbook files for the runs-worker (issue #44).

  Rendered only when runsWorker.playbooks is non-empty. Content arrives as
  filename -> YAML string; the worker's playbook registry validates each file
  fail-closed at startup (invalid files are rejected whole and logged, they
  never govern), and file playbooks default to status: shadow until the file
  itself says active.
*/}}
{{- if and .Values.runsWorker.enabled .Values.runsWorker.playbooks }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: soctalk-playbooks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
    app.kubernetes.io/name: soctalk-runs-worker
data:
  {{- range $name, $content := .Values.runsWorker.playbooks }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
{{- end }}
