{{- if .Values.runsWorker.enabled }}
{{- /* Canonical values key is runsWorker.triagePolicies; fall back to the deprecated
       runsWorker.playbooks for one release so a stale rendered values blob still rolls. */}}
{{- $tp := or .Values.runsWorker.triagePolicies .Values.runsWorker.playbooks }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soctalk-runs-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
    app.kubernetes.io/name: soctalk-runs-worker
spec:
  replicas: {{ .Values.runsWorker.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: soctalk-runs-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "soctalk-tenant.labels" . | nindent 8 }}
        app.kubernetes.io/name: soctalk-runs-worker
      {{- if or .Values.llm.secretChecksum $tp }}
      annotations:
        {{- if .Values.llm.secretChecksum }}
        # Forces a rollout when the LLM key material (primary or per-tier own
        # keys) rotates — env-from-secret does not hot-reload, and a key-only
        # change otherwise leaves chart values byte-identical (issue #12).
        checksum/llm-secret: {{ .Values.llm.secretChecksum | quote }}
        {{- end }}
        {{- if $tp }}
        # Forces a rollout when triage-policy content changes — the registry loads
        # once per process, so the rollout IS the activation gate (issue #44).
        checksum/triage-policies: {{ $tp | toJson | sha256sum | quote }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: tenant-{{ .Values.tenant.slug }}-sa
      automountServiceAccountToken: false
      {{- /*
        Same soctalkSystem.hostAliases block as the adapter — the runs-
        worker also calls back to L1 for run.complete events and needs to
        resolve the MSSP hostname when MagicDNS is off.
      */}}
      {{- with .Values.soctalkSystem.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: worker
          image: "{{ .Values.runsWorker.image.repository }}:{{ .Values.runsWorker.image.tag }}"
          imagePullPolicy: {{ .Values.runsWorker.image.pullPolicy | default "IfNotPresent" }}
          command: ["python", "-m", "soctalk.runs_worker.main"]
          env:
            - name: SOCTALK_TENANT_ID
              value: {{ .Values.tenant.id | quote }}
            - name: SOCTALK_TENANT_SLUG
              value: {{ .Values.tenant.slug | quote }}
            - name: SOCTALK_API_URL
              value: {{ if .Values.soctalkSystem.url -}}
                {{ .Values.soctalkSystem.url | quote }}
              {{- else -}}
                "http://{{ .Values.adapter.api.serviceHost }}:{{ .Values.adapter.api.servicePort }}"
              {{- end }}
            - name: WORKER_TOKEN_PATH
              value: /run/secrets/runs-worker/token
            {{- /*
              Run-concurrency (issue #61): N in-flight investigations per process
              so a shared self-hosted vLLM/SGLang backend fills its continuous
              batch. Emitted only when >1 so the default (serial) render stays
              byte-identical to the pre-change chart for --reuse-values upgrades.
            */}}
            {{- if gt (int (.Values.runsWorker.concurrency | default 1)) 1 }}
            - name: WORKER_RUN_CONCURRENCY
              value: {{ .Values.runsWorker.concurrency | quote }}
            - name: WORKER_DRAIN_SECONDS
              value: {{ .Values.runsWorker.drainSeconds | default 60 | quote }}
            {{- end }}
            {{- if $tp }}
            - name: SOCTALK_TRIAGE_POLICY_DIR
              value: /etc/soctalk/triage-policies
            # Deprecated alias, set for one release so an old worker image rolled
            # with this chart (reads only SOCTALK_PLAYBOOK_DIR) still finds its dir.
            - name: SOCTALK_PLAYBOOK_DIR
              value: /etc/soctalk/triage-policies
            {{- end }}
            {{- /*
                ``llm.provider`` accepts ``openai-compatible`` (the
                install-side enum), but the runs-worker's
                ``load_config()`` only knows ``openai`` and
                ``anthropic`` and reads the matching env var. Map
                ``openai-compatible`` → ``openai`` here and mount the
                key as ``OPENAI_API_KEY`` for openai providers, or
                ``ANTHROPIC_API_KEY`` for anthropic.
            */}}
            {{- $provRaw := .Values.llm.provider | default "anthropic" }}
            {{- $prov := ternary "openai" $provRaw (eq $provRaw "openai-compatible") }}
            {{- $tiers := .Values.llm.tiers | default dict }}
            {{- $tierKeys := .Values.llm.tierKeys | default dict }}
            - name: SOCTALK_LLM_PROVIDER
              value: {{ $prov | quote }}
            {{- /*
              Tenant-global default sampling. load_config() reads these into
              LLMConfig.temperature / .max_tokens (consumed by the router tier).
              Emitted only when set so an unset value keeps the process default.
            */}}
            {{- if not (kindIs "invalid" .Values.llm.temperature) }}
            - name: SOCTALK_LLM_TEMPERATURE
              value: {{ .Values.llm.temperature | quote }}
            {{- end }}
            {{- if .Values.llm.maxTokens }}
            - name: SOCTALK_LLM_MAX_TOKENS
              value: {{ .Values.llm.maxTokens | quote }}
            {{- end }}
            {{- /*
              Per-tenant case-run budget caps (issue #5). graph/budget.py reads
              these directly; emitted only when the tenant sets an override so an
              unset value keeps the worker default ($5 / 15k).
            */}}
            {{- if .Values.llm.dollarBudgetPerRun }}
            - name: SOCTALK_CASE_RUN_DOLLAR_BUDGET
              value: {{ .Values.llm.dollarBudgetPerRun | quote }}
            {{- end }}
            {{- if .Values.llm.tokenBudgetPerRun }}
            - name: SOCTALK_CASE_RUN_TOKEN_BUDGET
              value: {{ .Values.llm.tokenBudgetPerRun | quote }}
            {{- end }}
            {{- /*
              Per-tier LLM backends (issue #12). When a tier block is present the
              worker gets the full SOCTALK_<TIER>_* env (provider is required so
              #4's resolver materializes the tier and the mutual-exclusion guard
              relaxes); its own key rides in tenant-llm-key/<tier>_api_key. When a
              tier is absent, the legacy single-provider *_MODEL line is emitted
              instead — one source per env name, byte-identical to the pre-#12
              render for single-provider tenants.
            */}}
            {{- if $tiers.fast }}
            - name: SOCTALK_FAST_PROVIDER
              value: {{ $tiers.fast.provider | quote }}
            - name: SOCTALK_FAST_MODEL
              value: {{ $tiers.fast.model | quote }}
            - name: SOCTALK_FAST_BASE_URL
              value: {{ $tiers.fast.baseUrl | quote }}
            {{- if $tiers.fast.engine }}
            - name: SOCTALK_FAST_ENGINE
              value: {{ $tiers.fast.engine | quote }}
            {{- end }}
            {{- if $tiers.fast.decodingMode }}
            - name: SOCTALK_FAST_DECODING_MODE
              value: {{ $tiers.fast.decodingMode | quote }}
            {{- end }}
            {{- if not (kindIs "invalid" $tiers.fast.temperature) }}
            - name: SOCTALK_FAST_TEMPERATURE
              value: {{ $tiers.fast.temperature | quote }}
            {{- end }}
            {{- if $tiers.fast.maxTokens }}
            - name: SOCTALK_FAST_MAX_TOKENS
              value: {{ $tiers.fast.maxTokens | quote }}
            {{- end }}
            {{- if hasKey $tierKeys "fast" }}
            - name: SOCTALK_FAST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeyRef.name | quote }}
                  key: fast_api_key
            {{- end }}
            {{- else }}
            - name: SOCTALK_FAST_MODEL
              value: {{ .Values.runsWorker.fastModel | default .Values.llm.model | quote }}
            {{- end }}
            {{- if $tiers.reasoning }}
            - name: SOCTALK_REASONING_PROVIDER
              value: {{ $tiers.reasoning.provider | quote }}
            - name: SOCTALK_REASONING_MODEL
              value: {{ $tiers.reasoning.model | quote }}
            - name: SOCTALK_REASONING_BASE_URL
              value: {{ $tiers.reasoning.baseUrl | quote }}
            {{- if $tiers.reasoning.engine }}
            - name: SOCTALK_REASONING_ENGINE
              value: {{ $tiers.reasoning.engine | quote }}
            {{- end }}
            {{- if $tiers.reasoning.decodingMode }}
            - name: SOCTALK_REASONING_DECODING_MODE
              value: {{ $tiers.reasoning.decodingMode | quote }}
            {{- end }}
            {{- if not (kindIs "invalid" $tiers.reasoning.temperature) }}
            - name: SOCTALK_REASONING_TEMPERATURE
              value: {{ $tiers.reasoning.temperature | quote }}
            {{- end }}
            {{- if $tiers.reasoning.maxTokens }}
            - name: SOCTALK_REASONING_MAX_TOKENS
              value: {{ $tiers.reasoning.maxTokens | quote }}
            {{- end }}
            {{- if hasKey $tierKeys "reasoning" }}
            - name: SOCTALK_REASONING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeyRef.name | quote }}
                  key: reasoning_api_key
            {{- end }}
            {{- else }}
            - name: SOCTALK_REASONING_MODEL
              value: {{ .Values.runsWorker.reasoningModel | default .Values.llm.model | quote }}
            {{- end }}
            {{- /*
                Base-URL handling — only emit the provider-specific
                env var when the operator-configured ``llm.baseUrl``
                actually applies to this provider:

                - For ``openai`` we only emit when it differs from the
                  SDK default (``https://api.openai.com/v1``); pinning
                  the default is a no-op and leaks into the env.
                - For ``anthropic`` we only emit when the URL is
                  Anthropic-shaped (host contains ``anthropic``) so a
                  default-OpenAI ``baseUrl`` doesn't redirect Claude
                  calls to OpenAI's API.
            */}}
            {{- $bu := .Values.llm.baseUrl | default "" }}
            {{- if eq $prov "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeyRef.name | quote }}
                  key: {{ .Values.llm.apiKeyRef.key | quote }}
            {{- if and $bu (ne $bu "https://api.openai.com/v1") }}
            - name: OPENAI_BASE_URL
              value: {{ $bu | quote }}
            - name: OPENAI_API_BASE
              value: {{ $bu | quote }}
            {{- end }}
            {{- else }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeyRef.name | quote }}
                  key: {{ .Values.llm.apiKeyRef.key | quote }}
            {{- if and $bu (contains "anthropic" $bu) }}
            - name: ANTHROPIC_BASE_URL
              value: {{ $bu | quote }}
            {{- end }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.runsWorker.resources.requests.cpu | quote }}
              memory: {{ .Values.runsWorker.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.runsWorker.resources.limits.cpu | quote }}
              memory: {{ .Values.runsWorker.resources.limits.memory | quote }}
          volumeMounts:
            - name: worker-token
              mountPath: /run/secrets/runs-worker
              readOnly: true
            {{- if $tp }}
            - name: triage-policies
              mountPath: /etc/soctalk/triage-policies
              readOnly: true
            {{- end }}
      volumes:
        - name: worker-token
          secret:
            secretName: {{ .Values.runsWorker.tokenSecretRef.name | quote }}
            items:
              - key: {{ .Values.runsWorker.tokenSecretRef.key | quote }}
                path: token
            defaultMode: 0440
        {{- if $tp }}
        - name: triage-policies
          configMap:
            name: soctalk-triage-policies
        {{- end }}
{{- end }}
