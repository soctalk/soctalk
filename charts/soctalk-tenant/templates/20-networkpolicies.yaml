{{- if .Values.networkPolicies.enabled }}
{{/*
See docs/multi-tenant/cni-networkpolicy.md. §4.3.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: intra-ns-allow
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ podSelector: {} }]
  egress:
    - to: [{ podSelector: {} }]
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-soctalk-system
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  {{- /*
    The wazuh subchart labels its pods with ``app.kubernetes.io/name: wazuh``
    (chart name) + ``app.kubernetes.io/component: manager|indexer|dashboard``
    — NOT ``app.kubernetes.io/name: wazuh-manager``. Historical audit-log:
    the previous rule selected zero pods, so ``default-deny`` silently
    swallowed every cross-namespace call to wazuh and both the orchestrator
    and the L2 wait_for_ready probes broke. Match on the labels the
    subchart actually emits.
  */}}
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        # ``wazuh`` covers the wazuh subchart's manager + indexer + dashboard;
        # thehive / cortex are here for the future subchart deps.
        values: ["wazuh", "thehive", "cortex"]
      - key: app.kubernetes.io/component
        operator: In
        values: ["manager", "indexer", "dashboard", "thehive", "cortex"]
  policyTypes: [Ingress]
  ingress:
    # Permit ingress from BOTH the orchestrator (verdict / runs-worker
    # path, the original consumer) AND the API pod (chat agent's
    # per-tenant Wazuh routing — calls land on the API process, not the
    # orchestrator). See docs/mssp-chat-plan.md §"Risks #2".
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soctalk-system
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: ["orchestrator", "api"]
      ports:
        - { port: 55000, protocol: TCP }  # Wazuh manager API
        - { port: 9200, protocol: TCP }   # Wazuh indexer
        - { port: 9000, protocol: TCP }   # TheHive
        - { port: 9001, protocol: TCP }   # Cortex
    # L2 cloud-agent readiness probes. The agent lives in the
    # ``soctalk-agent`` namespace on the tenant cluster and needs to
    # reach the wazuh manager API (55000) during ``wait_for_ready`` after
    # ``install_helm_release``. Without this rule wait_for_ready never
    # completes because default-deny drops the probe silently and the
    # tenant lifecycle stays stuck in ``provisioning`` even though
    # every pod is 1/1 Ready.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soctalk-agent
      ports:
        - { port: 55000, protocol: TCP }  # Wazuh manager API
        - { port: 9200, protocol: TCP }   # Wazuh indexer
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adapter-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: soctalk-adapter
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soctalk-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - { port: 8000, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
    {{- /*
      Non-Cilium fallback for cross-cluster egress. When the operator
      set ``soctalkSystem.hostAliases`` (because the tenant cluster's
      DNS can't resolve the MSSP hostname), permit egress to those IPs
      on the standard MSSP ports. Flannel etc don't understand FQDN
      egress; this ipBlock rule is what actually keeps the connection
      open for heartbeat + ingest. Skipped when the list is empty
      (Cilium + toFQDNs handles it, or collapsed-tier mode).
    */}}
    {{- range $ha := .Values.soctalkSystem.hostAliases }}
    - to:
        - ipBlock:
            cidr: {{ printf "%s/32" $ha.ip | quote }}
      ports:
        - { port: 443, protocol: TCP }
        - { port: 80,  protocol: TCP }
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runs-worker-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: soctalk-runs-worker
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soctalk-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - { port: 8000, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
    {{- /* Same non-Cilium cross-cluster egress as the adapter — the
      runs-worker also POSTs run.complete back to L1. */}}
    {{- range $ha := .Values.soctalkSystem.hostAliases }}
    - to:
        - ipBlock:
            cidr: {{ printf "%s/32" $ha.ip | quote }}
      ports:
        - { port: 443, protocol: TCP }
        - { port: 80,  protocol: TCP }
    {{- end }}
    # Outbound LLM calls. Port derived from the configured LLM base URL so
    # self-hosted OpenAI-compatible endpoints on non-standard ports
    # (Ollama :11434, vLLM :8000, LiteLLM, …) work; defaults to 443 (https).
    - ports:
        - { port: {{ .Values.networkPolicies.llmEgressPort | default 443 }}, protocol: TCP }
---
{{/*
Wazuh agent ingress allow: see wazuh-ingress for the MSSP-edge SNI proxy pattern.
The ingress-system namespace holds the L4 proxy that SNI-routes to the
correct tenant's Wazuh manager.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wazuh-agent-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wazuh-manager
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-system
      ports:
        - { port: 1514, protocol: TCP }
        - { port: 1515, protocol: TCP }
---
{{/*
Wazuh Dashboard ingress allow. The dashboard is reached by browsers
through the cluster's nginx-ingress, which lives in the ingress-system
namespace.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wazuh-dashboard-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: dashboard
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-system
      ports:
        - { port: 5601, protocol: TCP }
{{- end }}

{{- /*
FQDN egress: adapter → L1 (cross-cluster L2 path) + external SIEM.

Stock NetworkPolicy has no FQDN support — it targets pods/namespaces
or IP CIDRs. Two cases need public-hostname egress for the adapter:
  - cross-cluster deploy: the L2 tenant cluster is separate from the
    MSSP's SocTalk install, so the adapter reaches L1 by hostname
    (soctalkSystem.url).
  - 'provided' profile: the tenant brings its OWN external Wazuh, so
    the adapter reaches the indexer (:9200) + manager API (:55000) by
    hostname (networkPolicies.externalSiemHosts, populated by render.py).
CiliumNetworkPolicy + toFQDNs is the standard pattern for both.

Gated by networkPolicies.fqdnEgress.enabled because:
  - the chart must render on clusters without Cilium CRDs
    (the CRD check fails the whole release otherwise)
  - collapsed-tier deploys don't need FQDN egress — the existing
    adapter-egress policy already allows the in-cluster path

Skip when there is nothing to allow: BOTH soctalkSystem.url AND
externalSiemHosts empty ⇒ no policy emitted (preserves the original
collapsed-tier fallback).

Operator on a non-Cilium cluster: turn this off and either install
with --set soctalkSystem.url='' (collapsed-tier fallback) or provide
equivalent egress via their own CNI's policy mechanism.
*/ -}}
{{- $extSiemHosts := .Values.networkPolicies.externalSiemHosts | default (list) }}
{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.fqdnEgress.enabled (or .Values.soctalkSystem.url (gt (len $extSiemHosts) 0)) }}
{{- /*
Build the FQDN allow-list: the L1 API host (parsed out of soctalkSystem.url,
port stripped) plus every external SIEM host. Deduped (uniq) so an indexer +
API that share a hostname collapse to one matchName, and the L1 host isn't
repeated if it also appears in the SIEM list.
*/ -}}
{{- $fqdns := list }}
{{- if .Values.soctalkSystem.url }}
{{-   $host := (urlParse .Values.soctalkSystem.url).host }}
{{-   if contains ":" $host }}{{- $host = index (splitList ":" $host) 0 }}{{- end }}
{{-   $fqdns = append $fqdns $host }}
{{- end }}
{{- $fqdns = concat $fqdns $extSiemHosts | uniq }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: adapter-fqdn-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: soctalk-adapter
  egress:
    # Kube DNS — required to resolve the FQDN in the first place.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
          rules:
            dns:
              - matchPattern: "*"
    # L1 API host (HTTP/S) + external SIEM hosts (Wazuh indexer :9200 +
    # manager API :55000). The union of ports is harmless: the adapter only
    # dials L1 on 443/80 and the SIEM on 9200/55000, so an unused host:port
    # pairing is simply never connected.
    - toFQDNs:
        {{- range $fqdns }}
        - matchName: {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - { port: "443",   protocol: TCP }
            - { port: "80",    protocol: TCP }
            - { port: "9200",  protocol: TCP }
            - { port: "55000", protocol: TCP }
{{- end }}
