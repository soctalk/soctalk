{{/*
Chart-materialized Secrets for the cross-cluster L2 path.

Both are guarded by non-empty checks on their plaintext values — when
the plaintext is empty, the chart does NOT emit a Secret and falls
back to the legacy "operator pre-provisions the Secret" contract.
That preserves the collapsed-tier deployment mode (L1 and L2 in the
same cluster, adapter-token and LLM key minted by the in-cluster
controller via client-go) without breaking existing installs.

Trust boundary note: plaintext arrives via the Helm values bag, which
is the same bag the AgentJob spec carries. Protecting Helm-values-at-
rest is the operator's responsibility at the Helm storage layer (we
don't re-encrypt here).
*/}}
{{- if .Values.soctalkSystem.adapterToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.adapter.tokenSecretRef.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
    soctalk.io/secret-purpose: adapter-token
type: Opaque
stringData:
  {{ .Values.adapter.tokenSecretRef.key }}: {{ .Values.soctalkSystem.adapterToken | quote }}
{{- end }}
{{- /*
  The LLM Secret materializes when ANY LLM key plaintext is present — the
  primary key OR a per-tier key (issue #12). A hybrid tenant may carry only
  tier keys (no primary), so guarding on apiKey alone would skip the Secret.
  The controller-owned path passes all of these empty and pre-writes the
  Secret directly, so the guard stays false there (no ownership conflict).
*/}}
{{- $tierKeys := .Values.llm.tierKeys | default dict }}
{{- if or .Values.llm.apiKey $tierKeys.fast $tierKeys.reasoning }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.llm.apiKeyRef.name | quote }}
  {{/*
  When the chart creates the Secret, it must live in the release
  namespace — the chart can't create objects in another namespace.
  The ConfigMap-rendered reference (40-configmap.yaml) overrides
  apiKeyRef.namespace to the release namespace on this same guard so
  the adapter looks in the right place.
  */}}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
    soctalk.io/secret-purpose: llm-api-key
    soctalk.io/tenant-id: {{ .Values.tenant.id | quote }}
type: Opaque
stringData:
  {{- if .Values.llm.apiKey }}
  {{ .Values.llm.apiKeyRef.key }}: {{ .Values.llm.apiKey | quote }}
  {{- end }}
  {{- if $tierKeys.fast }}
  fast_api_key: {{ $tierKeys.fast | quote }}
  {{- end }}
  {{- if $tierKeys.reasoning }}
  reasoning_api_key: {{ $tierKeys.reasoning | quote }}
  {{- end }}
{{- end }}
{{- if .Values.runsWorker.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.runsWorker.tokenSecretRef.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soctalk-tenant.labels" . | nindent 4 }}
    soctalk.io/secret-purpose: runs-worker-token
    soctalk.io/tenant-id: {{ .Values.tenant.id | quote }}
type: Opaque
stringData:
  {{ .Values.runsWorker.tokenSecretRef.key }}: {{ .Values.runsWorker.token | quote }}
{{- end }}
