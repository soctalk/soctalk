<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>wazuh-manager</manager_address>
    </enrollment>
  </client>

  <!-- A Nessus scan produces a burst of log lines; raise the client buffer so
       the agent forwards them all instead of throttling. -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>20000</queue_size>
    <events_per_second>1000</events_per_second>
  </client_buffer>

  <!-- Focus the alert stream on the scan's log signatures; silence baseline
       FIM/rootcheck/inventory noise. -->
  <rootcheck><disabled>yes</disabled></rootcheck>
  <syscheck><disabled>yes</disabled></syscheck>
  <wodle name="syscollector"><disabled>yes</disabled></wodle>
  <sca><enabled>no</enabled></sca>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>
</ossec_config>
